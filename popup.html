<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UYAP Tebligat PTT Takip</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 380px;
        min-height: 200px;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: #f8f9fa;
        color: #212529;
      }

      /* Header */
      .header {
        background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
        color: white;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-logo {
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }

      .header-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .header-subtitle {
        font-size: 11px;
        opacity: 0.8;
        margin-top: 2px;
      }

      /* Body */
      .body {
        padding: 16px 20px;
      }

      /* Barkod göstergesi */
      .barkod-card {
        background: white;
        border: 1px solid #e9ecef;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 12px;
        display: none;
      }

      .barkod-card.visible {
        display: block;
      }

      .barkod-label {
        font-size: 10px;
        font-weight: 600;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 4px;
      }

      .barkod-value {
        font-size: 18px;
        font-weight: 700;
        color: #c0392b;
        letter-spacing: 2px;
        font-family: "Courier New", monospace;
      }

      /* Sorgula butonu */
      .btn-query {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: opacity 0.2s, transform 0.1s;
        margin-bottom: 12px;
      }

      .btn-query:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .btn-query:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn-icon {
        font-size: 16px;
      }

      /* Loading spinner */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Durum kartı */
      .result-card {
        background: white;
        border: 1px solid #e9ecef;
        border-radius: 10px;
        overflow: hidden;
        display: none;
      }

      .result-card.visible {
        display: block;
      }

      .result-header {
        padding: 12px 14px;
        border-bottom: 1px solid #f1f3f5;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }

      .status-badge.teslim {
        background: #d4edda;
        color: #155724;
      }

      .status-badge.yolda {
        background: #fff3cd;
        color: #856404;
      }

      .status-badge.bekliyor {
        background: #d1ecf1;
        color: #0c5460;
      }

      .status-badge.bilinmiyor {
        background: #f8d7da;
        color: #721c24;
      }

      .result-body {
        padding: 12px 14px;
      }

      /* Hareket listesi */
      .hareket-list {
        list-style: none;
        position: relative;
      }

      .hareket-list::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 4px;
        bottom: 4px;
        width: 2px;
        background: #dee2e6;
        border-radius: 2px;
      }

      .hareket-item {
        display: flex;
        gap: 12px;
        padding: 6px 0;
        position: relative;
      }

      .hareket-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #dee2e6;
        flex-shrink: 0;
        margin-top: 2px;
        position: relative;
        z-index: 1;
        border: 2px solid white;
      }

      .hareket-item:first-child .hareket-dot {
        background: #c0392b;
      }

      .hareket-content {
        flex: 1;
      }

      .hareket-durum {
        font-size: 12px;
        font-weight: 600;
        color: #343a40;
      }

      .hareket-meta {
        font-size: 11px;
        color: #6c757d;
        margin-top: 1px;
      }

      /* Ham metin (fallback) */
      .ham-metin {
        font-size: 11px;
        color: #495057;
        line-height: 1.5;
        background: #f8f9fa;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 8px;
      }

      /* PTT'de Gör butonu */
      .btn-ptt {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
        padding: 8px;
        background: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        color: #495057;
        font-size: 12px;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: background 0.15s;
        margin-top: 8px;
      }

      .btn-ptt:hover {
        background: #e9ecef;
      }

      /* Hata mesajı */
      .error-box {
        background: #fff5f5;
        border: 1px solid #fed7d7;
        border-radius: 10px;
        padding: 12px 14px;
        color: #c53030;
        font-size: 12px;
        line-height: 1.5;
        display: none;
      }

      .error-box.visible {
        display: block;
      }

      .error-icon {
        font-size: 16px;
        margin-bottom: 6px;
      }

      /* Bilgi mesajı (başlangıç) */
      .info-box {
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 10px;
        padding: 12px 14px;
        color: #92400e;
        font-size: 12px;
        line-height: 1.5;
        text-align: center;
      }

      .info-box .info-icon {
        font-size: 24px;
        margin-bottom: 6px;
      }

      .footer {
        padding: 10px 20px;
        text-align: center;
        font-size: 10px;
        color: #adb5bd;
        border-top: 1px solid #f1f3f5;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-logo">📬</div>
      <div>
        <div class="header-title">UYAP Tebligat PTT Takip</div>
        <div class="header-subtitle">Tebligat barkodunu otomatik okur ve sorgular</div>
      </div>
    </div>

    <div class="body">
      <!-- Barkod kartı -->
      <div class="barkod-card" id="barkodCard">
        <div class="barkod-label">Tespit Edilen Barkod No</div>
        <div class="barkod-value" id="barkodValue">—</div>
      </div>

      <!-- Sorgula butonu -->
      <button class="btn-query" id="btnQuery">
        <span class="btn-icon">🔍</span>
        <span id="btnText">Tebligat Numarasını Oku ve Sorgula</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <!-- Başlangıç bilgi kutusu -->
      <div class="info-box" id="infoBox">
        <div class="info-icon">ℹ️</div>
        UYAP üzerinde bir tebligat belgesi açıkken butona basın.
        Barkod numarası otomatik okunacak ve PTT'den sorgulanacak.
      </div>

      <!-- Hata kutusu -->
      <div class="error-box" id="errorBox">
        <div class="error-icon">⚠️</div>
        <span id="errorText"></span>
      </div>

      <!-- Sonuç kartı -->
      <div class="result-card" id="resultCard">
        <div class="result-header">
          <span class="status-badge bilinmiyor" id="statusBadge">
            <span id="statusIcon">●</span>
            <span id="statusText">Sorgulanıyor...</span>
          </span>
        </div>
        <div class="result-body" id="resultBody"></div>
      </div>
    </div>

    <div class="footer">Yalnızca uyap.gov.tr domaininde çalışır</div>

    <script src="popup.js"></script>
  </body>
</html>
